<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#222" />
<title>阶级认知自我定位</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- TOOLBAR -->
<header class="toolbar" id="toolbar">
  <div class="tb-left">
    <span class="tb-title" id="schemeTitle">未命名方案</span>
    <span class="tb-dirty" id="dirtyDot" style="display:none">●</span>
  </div>
  <div class="tb-right">
    <button class="tb-btn" id="newBtn">新建</button>
    <button class="tb-btn" id="saveBtn">保存</button>
    <button class="tb-btn primary" id="manageBtn">方案</button>
  </div>
</header>

<!-- DIAMOND -->
<div class="diamond-wrap">
  <!-- TOP CORNERS -->
  <div class="corner top-left">
    <div class="arrow up"></div>
    <div class="corner-box red" contenteditable="true" data-placeholder="上层" data-key="topLeft"></div>
  </div>
  <div class="corner top-right">
    <div class="arrow up"></div>
    <div class="corner-box red" contenteditable="true" data-placeholder="上层" data-key="topRight"></div>
  </div>

  <!-- CENTER DIAMOND -->
  <div class="diamond" id="diamond">
    <div class="level top" data-level="1"></div>
    <div class="level top" data-level="2"></div>
    <div class="level top" data-level="3"></div>
    <div class="level top" data-level="4"></div>
    <div class="level top widest" data-level="5"></div>
    <div class="level bottom" data-level="6"></div>
    <div class="level bottom" data-level="7"></div>
    <div class="level bottom" data-level="8"></div>
    <div class="level bottom" data-level="9"></div>
  </div>

  <!-- BOTTOM CORNERS -->
  <div class="corner bottom-left">
    <div class="corner-box red" contenteditable="true" data-placeholder="下层" data-key="bottomLeft"></div>
    <div class="arrow down"></div>
  </div>
  <div class="corner bottom-right">
    <div class="corner-box red" contenteditable="true" data-placeholder="下层" data-key="bottomRight"></div>
    <div class="arrow down"></div>
  </div>
</div>

<!-- TRAY -->
<div class="tray" id="tray">
  <div class="tray-items" id="trayItems"></div>
  <button class="add-btn" id="addBtn" aria-label="添加小方块">+</button>
</div>

<!-- MODAL (outside all containers so z-index works correctly) -->
<div class="modal-mask" id="modalMask" style="display:none">
  <div class="modal" role="dialog" aria-label="方案管理">
    <div class="modal-head">
      <span class="modal-title">方案管理</span>
      <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
    </div>
    <div class="modal-head-tools">
      <button class="tb-btn small" id="exportBtn" title="导出为 JSON 文件">导出</button>
      <button class="tb-btn small" id="importBtn" title="从 JSON 文件导入">导入</button>
      <button class="tb-btn small danger" id="clearAllBtn" title="清空所有数据">清空</button>
    </div>
    <div class="modal-body">
      <div class="scheme-create">
        <input class="scheme-input" id="newNameInput" type="text" maxlength="30" placeholder="输入新方案名称" />
        <button class="tb-btn primary" id="createSchemeBtn">创建</button>
      </div>
      <div class="scheme-list" id="schemeList"></div>
    </div>
    <div class="modal-foot">
      <span class="storage-info" id="storageInfo">检测中...</span>
    </div>
  </div>
</div>
<input type="file" id="importFileInput" accept="application/json,.json" style="display:none" />

<!-- TOAST -->
<div class="toast" id="toast" style="display:none"></div>

<script src="app.js"></script>
</body>
</html>
